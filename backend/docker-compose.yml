# Docker Compose for IMUSI backend (SQLite)
# Usage: docker-compose up -d

services:
  backend:
    build: .
    container_name: imusi-backend
    environment:
      DATABASE_URL: sqlite:////app/data/imusi.db
      JWT_SECRET: change-this-dev-secret-to-32-characters-minimum
      JWT_REFRESH_SECRET: change-this-refresh-secret-to-32-characters-minimum
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000
